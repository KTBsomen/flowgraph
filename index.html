<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlowGraph — Workflow Builder</title>
  <link rel="stylesheet" href="src/styles.css">
  <style>
    html,
    body {
      height: 100%;
      margin: 0;
      overflow: hidden;
    }

    #app {
      height: 100vh;
      width: 100vw;
    }

    /* Toast notifications */
    .wf-toast-container {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: center;
      z-index: 9999;
    }

    .wf-toast {
      background: #1a1e2e;
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #e2e8f0;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
      animation: toast-in 0.3s ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    @keyframes toast-in {
      from {
        opacity: 0;
        transform: translateY(12px) scale(0.96);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .wf-toast--success {
      border-color: rgba(16, 185, 129, 0.4);
    }

    .wf-toast--error {
      border-color: rgba(239, 68, 68, 0.4);
    }

    /* Welcome banner */
    .wf-welcome {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      pointer-events: none;
      user-select: none;
      z-index: 0;
    }

    .wf-welcome-title {
      font-family: 'DM Sans', sans-serif;
      font-size: 28px;
      font-weight: 300;
      color: rgba(255, 255, 255, 0.08);
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }

    .wf-welcome-sub {
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.05);
    }
  </style>
</head>

<body>
  <div id="app"></div>

  <div class="wf-toast-container" id="wf-toasts"></div>

  <script type="module">
    import { createWorkflow } from './src/index.js';
    import { BUILT_IN_NODES } from './src/nodes/builtins.js';

    /* ── Custom node example ── */
    const customNode = {
      type: 'logger',
      label: 'Logger',
      category: 'Utilities',
      description: 'Log data to console',
      inputs: [{ name: 'in', label: 'Data', type: 'any' }],
      outputs: [{ name: 'out', label: 'Pass-through', type: 'any' }],
      configSchema: {
        level: { type: 'select', label: 'Log Level', options: ['info', 'warn', 'error', 'debug'], default: 'info' },
        prefix: { type: 'text', label: 'Prefix', default: '[Log]' },
        enabled: { type: 'boolean', label: 'Enabled', default: true },
      },
      style: { background: 'linear-gradient(135deg,#0ea5e9,#0284c7)' },
    };

    /* ── Create the workflow ── */
    const wf = createWorkflow({
      container: document.getElementById('app'),
      nodes: [customNode],
      canvasOptions: { snapToGrid: true, gridSize: 20 },
      minimap: true,

      onNodeAdd: ({ node, position }) => toast(`✦ Node added: ${node.label}`, 'success'),
      onConnect: edge => toast(`⟶ Connected ${edge.fromPort} → ${edge.toPort}`, 'success'),
      onDelete: ({ type, id }) => toast(`✕ ${type} deleted`, 'default'),
      onChange: data => {
        // Update debug overlay
        const adj = wf.getAdjacencyList();
        const ind = wf.getInDegree();
        const dbg = document.getElementById('wf-debug');
        if (dbg) {
          dbg.textContent =
            `Adjacency: ${JSON.stringify(adj, null, 2)}\n\nIn-Degree: ${JSON.stringify(ind, null, 2)}`;
        }
      },
    });

    /* ── Load a demo workflow ── */
    setTimeout(() => {
      const s = wf.addNode('start', { x: 80, y: 160 });
      const a = wf.addNode('action', { x: 340, y: 80 });
      const c = wf.addNode('condition', { x: 340, y: 280 });
      const api = wf.addNode('api', { x: 600, y: 80 });
      const e = wf.addNode('end', { x: 860, y: 220 });

      // Connect them!
      wf.addEdge(s, 'out', a, 'in');
      wf.addEdge(a, 'out', api, 'in');
      wf.addEdge(api, 'success', e, 'in');
      
      wf.fitToView();
    }, 150);

    /* ── Toast helper ── */
    function toast(msg, type = 'default') {
      const wrap = document.getElementById('wf-toasts');
      const el = document.createElement('div');
      el.className = `wf-toast wf-toast--${type}`;
      el.textContent = msg;
      wrap.appendChild(el);
      setTimeout(() => {
        el.style.opacity = '0';
        el.style.transform = 'translateY(8px)';
        el.style.transition = 'opacity 0.3s, transform 0.3s';
        setTimeout(() => el.remove(), 300);
      }, 3000);
    }

    /* Expose to window for console use */
    window.wf = wf;
    console.log('%c🔷 FlowGraph loaded!', 'color:#6366f1;font-weight:bold;font-size:14px');
    console.log('API: wf.getAdjacencyList(), wf.getInDegree(), wf.exportJSON(), wf.loadJSON(data)');
  </script>
</body>

</html>
